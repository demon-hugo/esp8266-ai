; ESP8266 WiFi clock firmware - Claude / Codex status display
; Board: ESP-12S based "SD2/小电视" weather clock w/ 1.54" ST7789 240x240 SPI TFT.
; Pin mapping below comes from the vendor's own working reference firmware
; (TFT_eSPI/User_Setup.h + SmallDesktopDisplay.ino, from the oshwhub SD2 project):
;   CS -> GPIO15/D8   DC -> GPIO2/D4   RST -> GPIO16/D0
;   SCLK -> GPIO14/D5 (HW SPI)   MOSI -> GPIO13/D7 (HW SPI)
;   Backlight -> GPIO0/D3, active HIGH
; If your board is wired differently, change the TFT_* build_flags below.

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-130
monitor_port = /dev/cu.usbserial-130
board_build.filesystem = littlefs

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.2.1
    bitbank2/AnimatedGIF@^2.2.0

build_flags =
    ; ---- TFT_eSPI setup for a 240x240 ST7789 SPI panel (vendor-confirmed pins) ----
    -D USER_SETUP_LOADED=1
    -D ST7789_2_DRIVER=1
    -D TFT_RGB_ORDER=TFT_RGB
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=13   ; D7 - HW SPI MOSI
    -D TFT_SCLK=14   ; D5 - HW SPI SCLK
    -D TFT_CS=15     ; D8 - CS
    -D TFT_DC=2      ; D4 - DC
    -D TFT_RST=16    ; D0 - RESET
    -D TFT_BL=0      ; D3 - backlight, active HIGH
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    ; ---- WiFiManager: Chinese captive-portal strings (include/wm_strings_zh.h) ----
    -I include
    -D WM_STRINGS_FILE='"wm_strings_zh.h"'
